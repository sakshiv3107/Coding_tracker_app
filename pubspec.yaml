name: coding_tracker_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^6.0.0
  provider: ^6.1.5+1  
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^6.2.2
  cloud_firestore: ^6.2.0
  http: ^1.6.0
  fl_chart: ^1.2.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_heatmap_calendar: ^1.0.5
  font_awesome_flutter: ^11.0.0
  animations: ^2.1.1
  flutter_local_notifications: ^20.1.0
  file_picker: ^8.1.6
  syncfusion_flutter_pdfviewer: ^31.1.19
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  path: ^1.9.1
  read_pdf_text: ^0.3.1
  url_launcher: ^6.3.0
  firebase_messaging: ^16.1.3
  workmanager: ^0.9.0+3
  flutter_secure_storage: ^10.0.0
  pdf: ^3.12.0
  flutter_pdfview: ^1.4.4
  google_generative_ai: ^0.4.6
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  firebase_storage: ^13.2.0
  cached_network_image: ^3.4.1
  share_plus: ^12.0.2
  ota_update: ^7.1.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
