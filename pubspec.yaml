name: coding_tracker_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^5.1.0
  provider: ^6.1.5+1  
  firebase_core: ^3.3.0
  firebase_auth: ^5.2.0
  google_sign_in: ^6.1.6
  cloud_firestore: ^5.4.0
  http: ^1.6.0
  fl_chart: ^0.66.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_heatmap_calendar: ^1.0.5
  font_awesome_flutter: ^10.9.1
  animations: ^2.1.1
  flutter_local_notifications: ^20.1.0
  file_picker: ^10.3.10
  syncfusion_flutter_pdfviewer: ^31.1.19
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  path: ^1.9.1
  read_pdf_text: ^0.3.1
  url_launcher: ^6.3.0
  firebase_messaging: ^15.2.10
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
